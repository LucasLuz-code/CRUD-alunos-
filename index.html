<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestão de Alunos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Gestão de Alunos</h1>
            <button id="btn-novo-aluno" class="btn-primary">Cadastrar Novo Aluno</button>
        </header>

        <main>
            <div id="lista-alunos" class="card">
                <h2>Alunos Matriculados</h2>
                <div class="table-responsive">
                    <table id="tabela-alunos">
                        <thead>
                            <tr>
                                <th>RM</th>
                                <th>Nome</th>
                                <th>CPF</th>
                                <th>Turma</th>
                                <th>Curso</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="corpo-tabela">
                            <!-- Alunos serão inseridos aqui via JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>

        <!-- Modal de Sucesso -->
        <div id="modal-sucesso" class="modal">
            <div class="modal-content success-card">
                <span class="close-sucesso">&times;</span>
                <div class="success-header">
                    <div class="success-icon">✓</div>
                    <h2>Aluno Cadastrado!</h2>
                </div>
                <div id="detalhes-sucesso" class="success-details">
                    <!-- Detalhes inseridos via JS -->
                </div>
                <div class="form-actions">
                    <button type="button" class="btn-primary" id="btn-ok-sucesso">OK</button>
                </div>
            </div>
        </div>

        <!-- Modal de Cadastro/Edição -->
        <div id="modal-aluno" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h2 id="modal-titulo">Cadastrar Aluno</h2>
                <form id="form-aluno">
                    <input type="hidden" id="aluno-id">

                    <div class="form-group">
                        <label for="nome">Nome Completo:</label>
                        <input type="text" id="nome" required>
                        <small class="error-msg" id="err-nome"></small>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="cpf">CPF:</label>
                            <input type="text" id="cpf" placeholder="000.000.000-00" required>
                            <small class="error-msg" id="err-cpf"></small>
                        </div>
                        <div class="form-group">
                            <label for="rg">RG:</label>
                            <input type="text" id="rg" placeholder="00.000.000-X" required>
                            <small class="error-msg" id="err-rg"></small>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="dataNascimento">Data de Nascimento:</label>
                            <input type="date" id="dataNascimento" required>
                            <small class="error-msg" id="err-data"></small>
                        </div>
                        <div class="form-group">
                            <label for="telefone">Telefone:</label>
                            <input type="text" id="telefone" placeholder="(00) 00000-0000" required>
                            <small class="error-msg" id="err-tel"></small>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="responsavel">Responsável:</label>
                        <input type="text" id="responsavel" required>
                        <small class="error-msg" id="err-resp"></small>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="turma">Turma:</label>
                            <select id="turma" required>
                                <option value="">Selecione...</option>
                                <option value="1 ano">1 ano</option>
                                <option value="2 ano">2 ano</option>
                                <option value="3 ano">3 ano</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="curso">Curso:</label>
                            <select id="curso" required>
                                <option value="">Selecione...</option>
                                <option value="DS">DS</option>
                                <option value="Química">Química</option>
                                <option value="Edificações">Edificações</option>
                                <option value="ADM">ADM</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="email">E-mail:</label>
                        <input type="email" id="email" required>
                        <small class="error-msg" id="err-email"></small>
                    </div>

                    <!-- ===== BLOCO DE ENDEREÇO ===== -->
                    <div class="section-divider">
                        <span>Endereço</span>
                    </div>

                    <div class="form-row">
                        <div class="form-group form-group--cep">
                            <label for="cep">CEP:</label>
                            <div class="cep-wrapper">
                                <input type="text" id="cep" placeholder="00000-000" maxlength="9" required>
                                <span id="cep-loading" class="cep-loading" style="display:none;">⏳</span>
                            </div>
                            <small class="error-msg" id="err-cep"></small>
                        </div>
                        <div class="form-group" style="flex: 2;">
                            <label for="logradouro">Logradouro:</label>
                            <input type="text" id="logradouro" placeholder="Rua / Avenida..." required>
                            <small class="error-msg" id="err-logradouro"></small>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group form-group--numero">
                            <label for="numero">Número:</label>
                            <input type="text" id="numero" placeholder="Nº" required>
                            <small class="error-msg" id="err-numero"></small>
                        </div>
                        <div class="form-group" style="flex: 2;">
                            <label for="complemento">Complemento:</label>
                            <input type="text" id="complemento" placeholder="Apto, Bloco... (opcional)">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group" style="flex: 2;">
                            <label for="bairro">Bairro:</label>
                            <input type="text" id="bairro" required>
                            <small class="error-msg" id="err-bairro"></small>
                        </div>
                        <div class="form-group" style="flex: 2;">
                            <label for="cidade">Cidade:</label>
                            <input type="text" id="cidade" required>
                            <small class="error-msg" id="err-cidade"></small>
                        </div>
                        <div class="form-group form-group--uf">
                            <label for="uf">UF:</label>
                            <input type="text" id="uf" placeholder="SP" maxlength="2" required>
                            <small class="error-msg" id="err-uf"></small>
                        </div>
                    </div>
                    <!-- ===== FIM DO BLOCO DE ENDEREÇO ===== -->

                    <div class="form-actions">
                        <button type="submit" class="btn-success" id="btn-salvar">Salvar</button>
                        <button type="button" class="btn-secondary" id="btn-cancelar">Cancelar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
